<!DOCTYPE html>
<html lang="en">
<head>
    <title>Search</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">

    <style>
        body {
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .Container-google-logo {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .google-logo {
            height: 15%;
            width: 22%;
        }

        .ContainerSearchBar {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .SearchBar {
            border-radius: 15em;
            width: 45%;
            padding: 12px 12px 12px 50px;
            font-size: large;
            border: 1px solid #DFE1E5;
        }

        .SearchBar:hover {
            box-shadow: 1px 1px 5px 2px #ebe7e7;
        }

        .SearchBar:focus {
            outline: none;
        }

        .fa-search {
            position: relative;
            left: 40px;
        }

        .Buttons {
            display: flex;
            justify-content: center;
        }

        .GoogleSearch,
        .Lucky {
            margin: 15px;
            padding: 8px 16px;
            background-color: #F8F9FA;
            border: 1px solid #F8F9FA;
            border-radius: 7px;
            cursor: pointer;
        }

        .GoogleSearch:hover,
        .Lucky:hover {
            border: 1px solid #cccfd2;
            box-shadow: 2px 2px 5px 2px #ebe7e7;
        }

        a {
            float: right;
            color: #333131;
            text-decoration: none;
            font-size: 13px;
            font-family: Arial, sans-serif;
            padding: 1em;
        }
    </style>
</head>

<body>

    <form action="https://www.google.com/search" method="get">

        <a href="google-images.html">Advanced Search</a>
        <a href="GoogleImageSearch.html">Image Search</a>

        <br><br><br>

        <div class="Container-google-logo">
            <img alt="Google" src="google-logo.png" class="google-logo">
        </div>

        <br><br>

        <div class="ContainerSearchBar">
            <i class="fa fa-search"></i>
            <input type="text" name="q" class="SearchBar">
        </div>

        <br>

        <div class="Buttons">
            <!-- Normal Search -->
            <input type="submit" value="Google Search" class="GoogleSearch">

            <!-- Proper Lucky Button -->
            <input type="submit" name="btnI" value="I'm Feeling Lucky" class="Lucky">
        </div>

    </form>

</body>
</html>
