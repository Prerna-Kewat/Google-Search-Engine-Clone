<!DOCTYPE html>
<html lang="en">
<head>
    <title>Google Search</title>

    <!-- Font Awesome (for search icon) -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }

        /* Header links */
        .header {
            display: flex;
            justify-content: flex-end;
            padding: 15px;
        }

        .header a {
            margin-left: 15px;
            text-decoration: none;
            color: #333;
            font-size: 14px;
        }

        /* Logo */
        .logo {
            margin-top: 100px;
        }

        .logo img {
            width: 270px;
        }

        /* Search box */
        .search-container {
            margin-top: 20px;
            position: relative;
            display: inline-block;
            width: 40%;
        }

        .search-container i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #9aa0a6;
        }

        .search-box {
            width: 100%;
            padding: 12px 12px 12px 40px;
            border-radius: 25px;
            border: 1px solid #dcdcdc;
        }

        .search-box:hover {
            box-shadow: 0 0 5px rgba(0,0,0,0.2);
        }

        .search-box:focus {
            outline: none;
        }

        /* Buttons */
        .buttons {
            margin-top: 20px;
        }

        .btn {
            padding: 10px 15px;
            margin: 5px;
            border: none;
            background-color: #f8f9fa;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn:hover {
            border: 1px solid #ccc;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <div class="header">
        <a href="GoogleImageSearch.html">Image Search</a>
        <a href="GoogleAdvancedSearch.html">Advanced Search</a>
    </div>

    <!-- Logo -->
    <div class="logo">
        <img src="google-logo.png" alt="Google">
    </div>

    <!-- Search Form -->
    <form action="https://www.google.com/search" method="get">

        <div class="search-container">
            <i class="fa fa-search"></i>
            <input type="text" name="q" class="search-box" placeholder="Search Google...">
        </div>

        <div class="buttons">
            <input type="submit" value="Google Search" class="btn">
            <input type="submit" name="btnI" value="I'm Feeling Lucky" class="btn">
        </div>

    </form>

</body>
</html>
