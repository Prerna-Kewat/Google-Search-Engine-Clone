<!DOCTYPE html>
<html lang="en">
<head>
    <title>Advanced Search</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            padding: 15px;
        }

        .header a {
            text-decoration: none;
            color: #333;
            margin-left: 15px;
            font-size: 14px;
        }

        /* Logo */
        .logo {
            margin: 20px;
        }

        .logo img {
            height: 30px;
        }

        /* Title */
        .title {
            color: #d93025;
            font-size: 20px;
            margin: 30px;
        }

        hr {
            border: 1px solid #eee;
        }

        /* Form */
        .container {
            margin: 30px;
            max-width: 700px;
        }

        .row {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .row label {
            width: 200px;
            font-size: 14px;
        }

        .row input {
            flex: 1;
            padding: 8px;
            border: 1px solid #dcdcdc;
        }

        .button-container {
            text-align: right;
        }

        .btn {
            background-color: #4d90fe;
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }

        .btn:hover {
            background-color: #357ae8;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <div class="header">
        <div class="logo">
            <a href="index.html">
                <img src="google-logo.png" alt="Google">
            </a>
        </div>

        <div>
            <a href="index.html">Google Search</a>
            <a href="GoogleImageSearch.html">Image Search</a>
        </div>
    </div>

    <div class="title">Advanced Search</div>
    <hr>

    <!-- Form -->
    <div class="container">
        <form action="https://www.google.com/search" method="get">

            <div class="row">
                <label>All these words:</label>
                <input type="text" name="as_q">
            </div>

            <div class="row">
                <label>Exact word or phrase:</label>
                <input type="text" name="as_epq">
            </div>

            <div class="row">
                <label>Any of these words:</label>
                <input type="text" name="as_oq">
            </div>

            <div class="row">
                <label>None of these words:</label>
                <input type="text" name="as_eq">
            </div>

            <div class="button-container">
                <input type="submit" value="Advanced Search" class="btn">
            </div>

        </form>
    </div>

</body>
</html>
